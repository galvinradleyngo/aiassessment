<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assessment Redesign Studio</title>
    <!-- React & Babel for browser execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Lucide Icons Library -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FBFBFD; }
        .transition-sidebar { transition: width 0.3s ease-in-out; }
        /* Hide scrollbars but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Modern Input Styling */
        input::placeholder, textarea::placeholder { color: #9CA3AF; font-weight: 400; }
    </style>
</head>
<body class="overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Enhanced Icon Component for Browser
        const Icon = ({ name, className = "w-5 h-5" }) => {
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [step, setStep] = useState(1);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [data, setData] = useState({
                courseName: '', subject: '', learningOutcomes: ['', ''], tasks: [''], 
                assessmentType: '', integratedSubtype: '', essentialTaskIndices: [], 
                humanCompetencyStrategy: '', integrityProvisions: '', submissionRequirements: '', 
                aiUsageGuidelines: '', integrationFocus: '', criticalEngagement: '', 
            });

            const blueprintRef = useRef(null);

            // Trigger Lucide to replace <i> tags whenever step or data changes
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [step, data, isSidebarOpen]);

            const updateData = (field, value) => setData(prev => ({ ...prev, [field]: value }));
            
            const handleOutcomeChange = (index, value) => {
                const newOutcomes = [...data.learningOutcomes];
                newOutcomes[index] = value;
                updateData('learningOutcomes', newOutcomes);
            };

            const handleTaskChange = (index, value) => {
                const newTasks = [...data.tasks];
                newTasks[index] = value;
                updateData('tasks', newTasks);
            };

            const toggleEssential = (index) => {
                setData(prev => {
                    const isEssential = prev.essentialTaskIndices.includes(index);
                    return {
                        ...prev,
                        essentialTaskIndices: isEssential 
                            ? prev.essentialTaskIndices.filter(i => i !== index)
                            : [...prev.essentialTaskIndices, index]
                    };
                });
            };

            const nextStep = () => step < 8 && setStep(prev => prev + 1);
            const prevStep = () => setStep(prev => prev - 1);

            const downloadImage = async () => {
                if (!blueprintRef.current) return;
                const canvas = await html2canvas(blueprintRef.current, { backgroundColor: null, scale: 2 });
                const link = document.createElement('a');
                link.download = `Blueprint-${data.subject || 'Assessment'}.png`;
                link.href = canvas.toDataURL();
                link.click();
            };

            const getThemeColor = () => {
                if (data.assessmentType === 'AI-Free') return { border: 'border-rose-500', bg: 'bg-rose-50', text: 'text-rose-700', banner: 'bg-rose-600', icon: 'shield-alert' };
                if (data.assessmentType === 'AI-Assisted') return { border: 'border-amber-500', bg: 'bg-amber-50', text: 'text-amber-700', banner: 'bg-amber-600', icon: 'zap' };
                if (data.assessmentType === 'AI-Integrated') return { border: 'border-emerald-500', bg: 'bg-emerald-50', text: 'text-emerald-700', banner: 'bg-emerald-600', icon: 'brain-circuit' };
                return { border: 'border-indigo-500', bg: 'bg-indigo-50', text: 'text-indigo-700', banner: 'bg-indigo-600', icon: 'circle-help' };
            };

            const formatListWithAnd = (items) => {
                if (items.length === 0) return "";
                if (items.length === 1) return items[0];
                return `${items.slice(0, -1).join(", ")} and ${items[items.length - 1]}`;
            };

            const renderStepContent = () => {
                switch(step) {
                    case 1: return (
                        <div className="space-y-6">
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-indigo-600 uppercase tracking-widest">Step 1</label>
                                <h3 className="text-3xl font-extrabold text-slate-900">Course Identification</h3>
                                <p className="text-slate-500">What is the name of the course for this redesign?</p>
                            </div>
                            <input autoFocus className="w-full p-5 bg-white border border-slate-200 rounded-3xl shadow-sm outline-none focus:ring-4 focus:ring-indigo-50 focus:border-indigo-500 transition-all text-lg font-medium" placeholder="e.g., Cost Accounting" value={data.courseName} onChange={e => updateData('courseName', e.target.value)} />
                        </div>
                    );
                    case 2: return (
                        <div className="space-y-6">
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-indigo-600 uppercase tracking-widest">Step 2</label>
                                <h3 className="text-3xl font-extrabold text-slate-900">Assessment Title</h3>
                                <p className="text-slate-500">What is the performance-based assessment?</p>
                            </div>
                            <input autoFocus className="w-full p-5 bg-white border border-slate-200 rounded-3xl shadow-sm outline-none focus:ring-4 focus:ring-indigo-50 focus:border-indigo-500 transition-all text-lg font-medium" placeholder="e.g., Cost Analysis Report" value={data.subject} onChange={e => updateData('subject', e.target.value)} />
                        </div>
                    );
                    case 3: return (
                        <div className="space-y-6">
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-indigo-600 uppercase tracking-widest">Step 3</label>
                                <h3 className="text-3xl font-extrabold text-slate-900">Learning Outcomes</h3>
                                <p className="text-slate-500">List the specific CLOs this assessment provides evidence for.</p>
                            </div>
                            <div className="space-y-3">
                                {data.learningOutcomes.map((outcome, index) => (
                                    <div key={index} className="flex gap-3 group">
                                        <input className="flex-1 p-4 bg-white border border-slate-200 rounded-2xl shadow-sm outline-none focus:ring-4 focus:ring-indigo-50 focus:border-indigo-500 transition-all" placeholder={`Outcome ${index + 1}...`} value={outcome} onChange={e => handleOutcomeChange(index, e.target.value)} />
                                        <button onClick={() => updateData('learningOutcomes', data.learningOutcomes.filter((_, i) => i !== index))} className="p-2 text-slate-300 hover:text-rose-500 transition-colors"><Icon name="trash-2" /></button>
                                    </div>
                                ))}
                                <button onClick={() => updateData('learningOutcomes', [...data.learningOutcomes, ''])} className="px-4 py-2 text-xs font-bold text-indigo-600 flex items-center gap-2 hover:bg-indigo-50 rounded-xl transition-colors"><Icon name="plus" className="w-3 h-3" /> ADD ANOTHER OUTCOME</button>
                            </div>
                        </div>
                    );
                    case 4: return (
                        <div className="space-y-6">
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-indigo-600 uppercase tracking-widest">Step 4</label>
                                <h3 className="text-3xl font-extrabold text-slate-900">Task Breakdown</h3>
                                <p className="text-slate-500">List the tasks required to complete the assessment.</p>
                            </div>
                            <div className="space-y-3">
                                {data.tasks.map((task, index) => (
                                    <div key={index} className="flex gap-3">
                                        <input className="flex-1 p-4 bg-white border border-slate-200 rounded-2xl shadow-sm outline-none focus:ring-4 focus:ring-indigo-50 focus:border-indigo-500 transition-all" placeholder={`Task ${index + 1}...`} value={task} onChange={e => handleTaskChange(index, e.target.value)} />
                                        <button onClick={() => updateData('tasks', data.tasks.filter((_, i) => i !== index))} className="p-2 text-slate-300 hover:text-rose-500 transition-colors"><Icon name="trash-2" /></button>
                                    </div>
                                ))}
                                <button onClick={() => updateData('tasks', [...data.tasks, ''])} className="px-4 py-2 text-xs font-bold text-indigo-600 flex items-center gap-2 hover:bg-indigo-50 rounded-xl transition-colors"><Icon name="plus" className="w-3 h-3" /> ADD ANOTHER TASK</button>
                            </div>
                        </div>
                    );
                    case 5: return (
                        <div className="space-y-8">
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-indigo-600 uppercase tracking-widest">Step 5</label>
                                <h3 className="text-3xl font-extrabold text-slate-900">Categorize Assessment</h3>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {[
                                    { id: 'AI-Free', icon: 'shield-alert', title: 'AI-Free', guide: "Pure human performance.", color: 'rose' },
                                    { id: 'AI-Assisted', icon: 'zap', title: 'AI-Assisted', guide: "Balanced hybrid.", color: 'amber' },
                                    { id: 'AI-Integrated', icon: 'brain-circuit', title: 'AI-Integrated', guide: "AI-native professional workflows.", color: 'emerald' }
                                ].map(p => (
                                    <button key={p.id} onClick={() => updateData('assessmentType', p.id)} className={`p-8 rounded-[2.5rem] border-2 text-left transition-all relative overflow-hidden group ${data.assessmentType === p.id ? `border-${p.color}-600 bg-${p.color}-600 text-white shadow-xl shadow-${p.color}-100` : 'border-slate-100 bg-white hover:border-indigo-200 shadow-sm hover:shadow-md'}`}>
                                        <Icon name={p.icon} className={`mb-6 w-8 h-8 ${data.assessmentType === p.id ? 'text-white' : `text-${p.color}-600`}`} />
                                        <h4 className="font-bold text-xl mb-2 tracking-tight">{p.title}</h4>
                                        <p className={`text-xs font-medium leading-relaxed ${data.assessmentType === p.id ? 'opacity-90' : 'text-slate-500'}`}>{p.guide}</p>
                                    </button>
                                ))}
                            </div>
                        </div>
                    );
                    case 6:
                        if (data.assessmentType === 'AI-Free') return (
                            <div className="space-y-6">
                                <div className="p-6 bg-rose-50 border border-rose-100 rounded-3xl">
                                    <p className="text-rose-900 font-medium">Select the primary strategy for ensuring <strong>Human Performance</strong>.</p>
                                </div>
                                <div className="grid grid-cols-1 gap-4">
                                    {['Proctoring', 'Validation (Oral/Viva)', 'Documentation'].map(s => (
                                        <button key={s} onClick={() => updateData('humanCompetencyStrategy', s)} className={`p-6 rounded-2xl border-2 text-left transition-all ${data.humanCompetencyStrategy === s ? 'border-rose-600 bg-rose-600 text-white shadow-lg' : 'bg-white border-slate-100 hover:border-rose-200 text-slate-600'}`}>
                                            <span className="text-base font-bold">{s}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        );
                        if (data.assessmentType === 'AI-Assisted') return (
                            <div className="space-y-6">
                                <h3 className="text-3xl font-extrabold text-slate-900 tracking-tight">Select Human Tasks</h3>
                                <p className="text-slate-500">Where must students apply outcomes without AI?</p>
                                <div className="grid grid-cols-1 gap-3">
                                    {data.tasks.map((task, index) => task.trim() && (
                                        <button key={index} onClick={() => toggleEssential(index)} className={`p-5 rounded-2xl border-2 text-left flex justify-between items-center transition-all ${data.essentialTaskIndices.includes(index) ? 'border-amber-600 bg-amber-50 shadow-sm' : 'bg-white border-slate-100 hover:border-amber-200'}`}>
                                            <span className={`text-sm font-bold ${data.essentialTaskIndices.includes(index) ? 'text-amber-900' : 'text-slate-600'}`}>{task}</span>
                                            {data.essentialTaskIndices.includes(index) && <Icon name="check-circle-2" className="text-amber-600" />}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        );
                        return (
                            <div className="space-y-6">
                                <h3 className="text-3xl font-extrabold text-slate-900">Integration Path</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <button onClick={() => updateData('integratedSubtype', 'ObjectOfStudy')} className={`p-8 rounded-3xl border-2 transition-all ${data.integratedSubtype === 'ObjectOfStudy' ? 'border-emerald-600 bg-emerald-600 text-white shadow-lg' : 'bg-white border-slate-100 hover:border-emerald-200'}`}>
                                        <Icon name="search" className="mb-4" />
                                        <span className="font-bold">AI as Object of Study</span>
                                    </button>
                                    <button onClick={() => updateData('integratedSubtype', 'Collaborator')} className={`p-8 rounded-3xl border-2 transition-all ${data.integratedSubtype === 'Collaborator' ? 'border-emerald-600 bg-emerald-600 text-white shadow-lg' : 'bg-white border-slate-100 hover:border-emerald-200'}`}>
                                        <Icon name="users" className="mb-4" />
                                        <span className="font-bold">AI as Collaborator</span>
                                    </button>
                                </div>
                            </div>
                        );
                    case 7: return (
                        <div className="space-y-6">
                            <h3 className="text-3xl font-extrabold text-slate-900">Accountability</h3>
                            <div className="space-y-4">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Integrity Provisions</label>
                                    <textarea className="w-full h-32 p-5 border border-slate-200 rounded-3xl outline-none focus:ring-4 focus:ring-indigo-50 focus:border-indigo-500" placeholder="e.g., Must provide full AI chat logs as appendix..." value={data.integrityProvisions} onChange={e => updateData('integrityProvisions', e.target.value)} />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Critical Engagement</label>
                                    <textarea className="w-full h-32 p-5 border border-slate-200 rounded-3xl outline-none focus:ring-4 focus:ring-indigo-50 focus:border-indigo-500" placeholder="e.g., Reflection section identifying AI bias..." value={data.criticalEngagement} onChange={e => updateData('criticalEngagement', e.target.value)} />
                                </div>
                            </div>
                        </div>
                    );
                    case 8: {
                        const theme = getThemeColor();
                        const auxiliaryTasks = data.tasks.filter((_, i) => !data.essentialTaskIndices.includes(i) && _.trim());
                        const coreTasksNames = data.essentialTaskIndices.map(i => data.tasks[i]).join(", ");
                        
                        const policyText = data.assessmentType === 'AI-Free' 
                            ? `This is an AI-FREE ASSESSMENT. The use of AI is prohibited. To ensure your personal performance: ${data.integrityProvisions}`
                            : data.assessmentType === 'AI-Assisted' 
                                ? `This is an AI-ASSISTED ASSESSMENT. You are allowed to use AI to: ${formatListWithAnd(auxiliaryTasks)}. AI is prohibited for: ${coreTasksNames}. To ensure mastery: ${data.integrityProvisions}`
                                : `This is an AI-INTEGRATED ASSESSMENT. To ensure mastery: ${data.integrityProvisions}. ${data.criticalEngagement}`;

                        return (
                            <div className="space-y-8 pb-20 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-3xl font-extrabold text-slate-900 tracking-tight">Studio Final Output</h3>
                                    <button onClick={downloadImage} className="px-8 py-3 bg-indigo-600 text-white rounded-2xl font-bold shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all flex items-center gap-2 underline-none">
                                        <Icon name="download" className="w-4 h-4" /> Export Design
                                    </button>
                                </div>
                                <div ref={blueprintRef} className={`bg-white border border-slate-200 rounded-[2.5rem] overflow-hidden shadow-2xl ring-1 ring-slate-200 ring-offset-8`}>
                                    <div className={`${theme.banner} p-10 text-white relative`}>
                                        <div className="absolute top-0 right-0 p-8 opacity-10">
                                            <Icon name={theme.icon} className="w-32 h-32" />
                                        </div>
                                        <p className="text-[10px] font-black uppercase tracking-[0.2em] opacity-80 mb-2">Adaptive Design Blueprint</p>
                                        <h4 className="text-3xl font-black mb-1">{data.courseName || 'Untitled Course'}</h4>
                                        <p className="text-lg font-medium opacity-90">{data.subject || 'Performance Assessment'}</p>
                                    </div>
                                    <div className="p-10 space-y-8 bg-white">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="p-6 bg-slate-50 border border-slate-100 rounded-3xl">
                                                <p className="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest">Evidence of Outcomes</p>
                                                <div className="space-y-2">
                                                    {data.learningOutcomes.filter(o => o.trim()).map((o, i) => (
                                                        <p key={i} className="text-xs font-bold text-slate-700 flex items-start gap-2 leading-relaxed">
                                                            <span className="w-1.5 h-1.5 bg-indigo-400 rounded-full mt-1.5 shrink-0" /> {o}
                                                        </p>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="p-6 bg-slate-50 border border-slate-100 rounded-3xl flex flex-col justify-center">
                                                <p className="text-[10px] font-black uppercase text-slate-400 mb-3 tracking-widest">Assessment Category</p>
                                                <div className={`inline-flex items-center gap-2 px-4 py-2 rounded-full text-xs font-black uppercase ${theme.bg} ${theme.text} self-start`}>
                                                    <Icon name={theme.icon} className="w-4 h-4" />
                                                    {data.assessmentType}
                                                </div>
                                                <p className="text-[10px] font-bold text-slate-400 mt-4 uppercase">Integrity Strategy</p>
                                                <p className="text-xs font-bold text-slate-800 mt-1">{data.humanCompetencyStrategy || 'In-Process Validation'}</p>
                                            </div>
                                        </div>
                                        <div className={`p-8 rounded-[2rem] border-2 ${theme.border} bg-slate-50 shadow-inner`}>
                                            <div className="flex items-center gap-2 mb-4">
                                                <Icon name="scroll-text" className={`${theme.text}`} />
                                                <p className="text-xs font-black uppercase tracking-widest text-slate-400">Syllabus AI Disclosure</p>
                                            </div>
                                            <p className="text-sm font-medium leading-relaxed text-slate-700 italic">"{policyText}"</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    }
                    default: return null;
                }
            };

            return (
                <div className="h-screen flex flex-col">
                    <nav className="h-20 border-b bg-white/80 backdrop-blur-md px-8 flex items-center justify-between shrink-0 z-50">
                        <div className="flex items-center gap-6">
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-3 hover:bg-slate-50 rounded-2xl text-slate-400 transition-colors">
                                <Icon name={isSidebarOpen ? "layout-sidebar" : "layout-sidebar-reverse"} />
                            </button>
                            <div className="flex items-center gap-4">
                                <div className="w-10 h-10 bg-indigo-600 rounded-[1.2rem] flex items-center justify-center shadow-lg shadow-indigo-200">
                                    <Icon name="brain-circuit" className="text-white w-6 h-6" />
                                </div>
                                <div className="flex flex-col">
                                    <span className="font-black text-slate-900 tracking-tighter uppercase text-base">Redesign Studio</span>
                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] -mt-1">Adaptive Assessment AI</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="flex flex-col items-end gap-1">
                                <span className="text-[10px] font-bold text-slate-400 uppercase">Progress</span>
                                <div className="w-48 h-2 bg-slate-100 rounded-full overflow-hidden">
                                    <div className="h-full bg-indigo-600 transition-all duration-700 ease-out" style={{ width: `${(step / 8) * 100}%` }} />
                                </div>
                            </div>
                        </div>
                    </nav>

                    <div className="flex flex-1 overflow-hidden">
                        <aside className={`bg-white border-r transition-sidebar flex flex-col overflow-hidden ${isSidebarOpen ? 'w-[320px]' : 'w-0'}`}>
                            <div className="p-8 flex-1 overflow-y-auto space-y-10 min-w-[320px] no-scrollbar">
                                <div className="space-y-6">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Course Profile</label>
                                        <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                            <p className="text-xs font-bold text-slate-400 uppercase mb-1">Name</p>
                                            <p className="text-sm font-black text-slate-900 line-clamp-2 leading-snug">{data.courseName || 'Not Set'}</p>
                                            <div className="h-px bg-slate-200 my-3" />
                                            <p className="text-xs font-bold text-slate-400 uppercase mb-1">Assessment</p>
                                            <p className="text-sm font-black text-slate-900 line-clamp-2 leading-snug">{data.subject || 'Not Set'}</p>
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Design Category</label>
                                        <div className="mt-1">
                                            <span className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-wider ${data.assessmentType ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                                {data.assessmentType || 'Analyzing...'}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                                <div className="space-y-4 pt-6 border-t border-slate-100">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Evidence Points</label>
                                    <div className="space-y-3">
                                        {data.learningOutcomes.filter(o => o.trim()).map((o, i) => (
                                            <p key={i} className="text-[11px] font-semibold text-slate-600 leading-relaxed bg-slate-50 p-2.5 rounded-xl border border-slate-100">{o}</p>
                                        ))}
                                    </div>
                                </div>
                                <div className="space-y-4 pt-6 border-t border-slate-100">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Process Tasks</label>
                                    <div className="space-y-3">
                                        {data.tasks.filter(t => t.trim()).map((t, i) => (
                                            <div key={i} className={`p-3 rounded-xl border text-[11px] font-bold flex items-center gap-2 ${data.essentialTaskIndices.includes(i) ? 'bg-amber-50 border-amber-100 text-amber-700' : 'bg-slate-50 border-slate-100 text-slate-500'}`}>
                                                <div className={`w-1.5 h-1.5 rounded-full ${data.essentialTaskIndices.includes(i) ? 'bg-amber-500' : 'bg-slate-300'}`} />
                                                {t}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </aside>

                        <main className="flex-1 overflow-y-auto bg-[#FBFBFD] no-scrollbar">
                            <div className="max-w-3xl mx-auto px-12 py-20">
                                <div className="min-h-[400px]">
                                    {renderStepContent()}
                                </div>
                                
                                {step < 8 && (
                                    <div className="mt-16 flex items-center justify-between pt-10 border-t border-slate-200">
                                        <button onClick={prevStep} disabled={step === 1} className={`flex items-center gap-2 px-6 py-3 rounded-2xl font-bold transition-all ${step === 1 ? 'opacity-0 cursor-default' : 'text-slate-400 hover:text-slate-900 hover:bg-slate-100'}`}>
                                            <Icon name="arrow-left" className="w-4 h-4" /> Back
                                        </button>
                                        <button onClick={nextStep} className="group flex items-center gap-3 px-10 py-4 bg-indigo-600 text-white rounded-3xl text-sm font-black shadow-2xl shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-0.5 transition-all">
                                            CONTINUE <Icon name="arrow-right" className="w-4 h-4 transition-transform group-hover:translate-x-1" />
                                        </button>
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
